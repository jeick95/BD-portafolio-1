<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Gemini</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#030712;color:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.bg{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.bg span{position:absolute;border-radius:50%;opacity:.04;animation:flt 25s ease-in-out infinite}
.bg span:nth-child(1){width:500px;height:500px;background:#6366f1;top:-150px;right:-150px}
.bg span:nth-child(2){width:350px;height:350px;background:#06b6d4;bottom:10%;left:-100px;animation-delay:-8s}
@keyframes flt{0%,100%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(50px,-50px) rotate(90deg)}50%{transform:translate(-30px,30px) rotate(180deg)}75%{transform:translate(20px,-20px) rotate(270deg)}}
.card{position:relative;z-index:1;width:100%;max-width:720px;background:#0f172a;border:1px solid #1e293b;border-radius:24px;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,.6)}
.head{background:linear-gradient(135deg,#6366f1,#06b6d4);padding:1.5rem 2rem;display:flex;align-items:center;gap:1rem}
.head-av{width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:#fff;flex-shrink:0;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.head h1{color:#fff;font-size:1.2rem;font-weight:700;letter-spacing:.3px}
.head p{color:rgba(255,255,255,.8);font-size:.8rem;display:flex;align-items:center;gap:.35rem;margin-top:.15rem}
.head p i{width:7px;height:7px;background:#10b981;border-radius:50%;display:inline-block}
.body{padding:1.5rem 2rem 2rem}
.chat{background:#0f172a;border:1px solid #1e293b;border-radius:16px;padding:1.25rem;margin-bottom:1rem;max-height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:.75rem;min-height:200px}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:#6366f1;border-radius:2px}
.msg{display:flex;gap:.5rem;max-width:90%;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.msg.u{align-self:flex-end;flex-direction:row-reverse}
.msg.b{align-self:flex-start}
.msg .av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem}
.msg.b .av{background:linear-gradient(135deg,#6366f1,#06b6d4);color:#fff}
.msg.u .av{background:#1e293b;color:#94a3b8}
.msg .bub{padding:.7rem .9rem;border-radius:14px;font-size:.85rem;line-height:1.55;word-wrap:break-word}
.msg.b .bub{background:#1e293b;color:#f8fafc;border:1px solid #334155;border-bottom-left-radius:4px}
.msg.u .bub{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border-bottom-right-radius:4px}
.msg .bub a{color:#818cf8;text-decoration:underline}
.msg .bub code{background:rgba(99,102,241,.12);padding:.15rem .35rem;border-radius:4px;font-size:.76rem}
.typing{display:flex;gap:4px;padding:.7rem .9rem;background:#1e293b;border-radius:14px;border:1px solid #334155;border-bottom-left-radius:4px;align-self:flex-start}
.typing span{width:7px;height:7px;border-radius:50%;background:#6366f1;animation:ty 1.3s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.inp{display:flex;gap:.5rem}
.inp textarea{flex:1;background:#0f172a;border:1px solid #334155;border-radius:12px;padding:.75rem .9rem;color:#f8fafc;font-size:.85rem;font-family:'Inter',sans-serif;outline:none;resize:none;min-height:48px;max-height:120px;transition:.25s}
.inp textarea:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.inp textarea::placeholder{color:#64748b}
.inp .go{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#6366f1,#06b6d4);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:.25s;flex-shrink:0}
.inp .go:hover{transform:scale(1.06)}
.inp .go:disabled{opacity:.45;cursor:not-allowed;transform:none}
.quick{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.75rem}
.quick button{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);color:#818cf8;padding:.3rem .65rem;border-radius:14px;font-size:.7rem;cursor:pointer;transition:.2s}
.quick button:hover{background:#6366f1;color:#fff;border-color:#6366f1}
.foot{padding:.6rem;text-align:center;font-size:.6rem;color:#64748b;border-top:1px solid #1e293b}
@media(max-width:600px){.head{padding:1rem 1.25rem}.body{padding:1rem}.card{border-radius:16px}.chat{max-height:300px}}
</style>
</head>
<body>
<div class="bg"><span></span><span></span></div>
<div class="card">
<div class="head">
<div class="head-av"><i class="fas fa-sparkles"></i></div>
<div>
<h1><i class="fas fa-magic"></i> Asistente Gemini</h1>
<p><i></i> Conectado</p>
</div>
</div>
<div class="body">
<div class="chat" id="chat">
<div class="msg b">
<div class="av"><i class="fas fa-sparkles"></i></div>
<div class="bub">
Hola, soy tu <strong>Asistente Gemini</strong>.<br><br>
Preg&uacute;ntame lo que quieras y te responder&eacute; con IA en tiempo real.
</div>
</div>
</div>
<div class="inp">
<textarea id="input" placeholder="Escribe tu pregunta..." rows="1" onkeypress="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
<button class="go" id="go" onclick="send()"><i class="fas fa-paper-plane"></i></button>
</div>
<div class="quick">
<button onclick="ask('Escribe un poema sobre la tecnología')">📝 Poema</button>
<button onclick="ask('Explica qué es IA en 3 líneas')">🤖 ¿Qué es IA?</button>
<button onclick="ask('Dame ideas para un proyecto web')">💡 Ideas</button>
<button onclick="ask('Cuéntame un chiste de programadores')">😂 Chiste</button>
</div>
</div>
<div class="foot">Asistente con Gemini API &bull; Portafolio BD II</div>
</div>
<script>
// === CONFIGURACIÓN ===
// Cambia esto a tu URL de Vercel cuando lo despliegues
// const API_URL = 'http://localhost:3000';
const API_URL = 'https://bd-portafolio-1.vercel.app';

let sessionId = 'session_' + Date.now();
let useContext = false; // Cambia a true para usar datos de Supabase

async function send(){
const inp=document.getElementById('input'),msg=inp.value.trim();
if(!msg)return;
inp.value='';
addMsg(msg,'u');
typing(true);
try{
let r=await callAI(msg);
typing(false);
addMsg(r,'b');
}catch(e){
typing(false);
console.error(e);
let msg=e.message;
if(msg.includes('cuota')||msg.includes('quota')||msg.includes('429'))
msg='La API key de Gemini agotó su cuota. Crea una nueva en https://aistudio.google.com/apikey';
if(msg.includes('fetch')||msg.includes('Failed to fetch'))
msg='No se puede conectar al backend. Asegúrate de que el servidor esté corriendo (node server.js)';
addMsg('⚠️ '+msg,'b');
}
}

function ask(m){document.getElementById('input').value=m;send()}

async function callAI(msg){
const endpoint = useContext ? '/chat-context' : '/chat';
const r=await fetch(API_URL+endpoint,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({message:msg,sessionId})
});
const d=await r.json();
if(!r.ok)throw new Error(d.error||'Error del servidor');
return d.reply;
}

function addMsg(txt,type){
const c=document.getElementById('chat'),d=document.createElement('div');
d.className='msg '+type;
const av=type==='b'?'fa-sparkles':'fa-user';
d.innerHTML='<div class="av"><i class="fas '+av+'"></i></div><div class="bub">'+txt.replace(/\n/g,'<br>')+'</div>';
c.appendChild(d);c.scrollTop=c.scrollHeight;
}

function typing(on){
let t=document.getElementById('ty');
if(on&&!t){
const c=document.getElementById('chat'),d=document.createElement('div');
d.className='typing';d.id='ty';d.innerHTML='<span></span><span></span><span></span>';
c.appendChild(d);c.scrollTop=c.scrollHeight;
}
if(!on&&t)t.remove();
}

// Verificar conexión al backend al cargar
(async function(){
try{
const r=await fetch(API_URL+'/chat',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({message:'ping',sessionId})
});
if(r.ok){
document.querySelector('.head p').innerHTML='<i></i> Backend conectado';
document.querySelector('.head p i').style.background='#10b981';
}
}catch(e){
document.querySelector('.head p').innerHTML='<i></i> Sin conexión al backend';
document.querySelector('.head p i').style.background='#ef4444';
}
})();

document.getElementById('input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'});
</script>
</body>
</html>
